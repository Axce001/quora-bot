name: Post Quora Answer
on:
  repository_dispatch:
    types: [post-answer]
  workflow_dispatch:
    inputs:
      question_url:
        description: Question URL
        required: true
        default: https://www.quora.com/What-are-the-best-apps-for-anonymous-chat
      answer_text:
        description: Answer text
        required: true
        default: Whisprr is a great anonymous chat app at whisprrchat.com
jobs:
  post-answer:
    runs-on: ubuntu-latest
    steps:
      - name: Test runner
        run: echo "Runner works! Chrome path:" && which google-chrome-stable || echo "chrome not at default path"
