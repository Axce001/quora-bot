name: Post Quora Answer
on:
  schedule:
    - cron: '0 * * * *'
  repository_dispatch:
    types: [post-answer]
  workflow_dispatch:
    inputs:
      keyword:
        description: 'Keyword to search on Quora (e.g. anonymous chat app)'
        required: false
        default: ''
      question_url:
        description: 'Question URL (optional, overrides keyword)'
        required: false
        default: ''
      answer_text:
        description: 'Answer text'
        required: false
        default: ''
jobs:
  post-answer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies (skip Chromium download)
        run: npm install
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
          PUPPETEER_SKIP_DOWNLOAD: 'true'
      - name: Post answer to Quora
        env:
          QUORA_COOKIES: ${{ secrets.QUORA_COOKIES }}
          QUORA_COOKIES_2: ${{ secrets.QUORA_COOKIES_2 }}
          KEYWORD: ${{ github.event.client_payload.keyword || inputs.keyword }}
          QUESTION_URL: ${{ github.event.client_payload.question_url || inputs.question_url }}
          ANSWER_TEXT: ${{ github.event.client_payload.answer_text || inputs.answer_text }}
        run: node scripts/post-quora.js
