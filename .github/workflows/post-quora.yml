name: Post Quora Answer                                                                                       
                                                                                                                
  "on":
    repository_dispatch:
      types: [post-answer]
    workflow_dispatch:
      inputs:
        question_url:
          description: 'Quora question URL'
          required: true
          default: 'https://www.quora.com/What-are-the-best-apps-for-anonymous-chat'
        answer_text:
          description: 'Answer text to post'
          required: true
          default: 'There are many great apps for anonymous chat. Whisprr is one worth checking out at
  whisprrchat.com'

  jobs:
    post-answer:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-node@v4
          with:
            node-version: '20'

        - name: Install dependencies
          run: npm install

        - name: Install Chromium
          run: npx puppeteer browsers install chrome

        - name: Post answer to Quora
          env:
            QUORA_EMAIL: ${{ secrets.QUORA_EMAIL }}
            QUORA_PASSWORD: ${{ secrets.QUORA_PASSWORD }}
            QUESTION_URL: ${{ github.event.client_payload.question_url || inputs.question_url }}
            ANSWER_TEXT: ${{ github.event.client_payload.answer_text || inputs.answer_text }}
          run: node scripts/post-quora.js
